name: NodeJS with jest test

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]
        
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: ChangeFolder
      run: cd jestway
      
    - name: Build
      run: |
        cd jestway
        # ใช้ npm install ธรรมดา เพื่อให้ได้ library ตามที่คุณตั้งค่าไว้ (^29.7.0)
        npm install
        # แก้ปัญหา Permission Denied สำหรับ Jest
        chmod +x node_modules/.bin/jest

    - name: Test
      run: |
        cd jestway
        npm test
